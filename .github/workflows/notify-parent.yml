name: Notify Parent Repo

on:
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger submodule update in HarborGuard
        env:
          GH_TOKEN: ${{ secrets.PARENT_REPO_TOKEN }}
        run: |
          gh api repos/HarborGuard/HarborGuard/dispatches \
            -f event_type=sensor-updated \
            -f "client_payload[sha]=${{ github.sha }}" \
            -f "client_payload[ref]=${{ github.ref }}"
